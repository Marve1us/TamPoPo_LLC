name: CodeQL

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  schedule:
    - cron: "0 7 * * 1" # weekly on Mondays (UTC)
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: Analyze (CodeQL)
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        language: ["javascript-typescript"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      # For most JS/TS projects, CodeQL can analyze without a build step.
      # If you want, you can add npm ci / npm run build here later.

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
